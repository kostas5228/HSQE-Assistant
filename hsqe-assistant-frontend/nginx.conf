server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for all text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # React Router — serve index.html for every unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever, everything else for a short while
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

