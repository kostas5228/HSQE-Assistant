spring.application.name=hsqe-assistant-backend

# ===========================================================================
#  PROFILES
# ===========================================================================
# Default = local development (loads application-dev.properties).
# Activate prod with: --spring.profiles.active=prod
# (or SPRING_PROFILES_ACTIVE=prod env var on the server).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===========================================================================
#  Cross-profile defaults
# ===========================================================================
# Avoid the "Open Session In View" anti-pattern in every environment.
spring.jpa.open-in-view=false

# Server port: use $PORT if the hosting platform sets it (Render, Heroku, ...),
# otherwise default to 8080 locally.
server.port=${PORT:8080}
