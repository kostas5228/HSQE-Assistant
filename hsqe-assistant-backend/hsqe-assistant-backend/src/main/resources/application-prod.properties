# ===========================================================================
#  PRODUCTION PROFILE
#  Activate with: --spring.profiles.active=prod
#         or set: SPRING_PROFILES_ACTIVE=prod
# ===========================================================================
#
# Use this profile when deploying to an online host (Render, Railway, Fly.io,
# Heroku, AWS, ...). The host is expected to provide:
#
#   * A managed PostgreSQL database, exposed via the standard env vars:
#       JDBC_DATABASE_URL       e.g. jdbc:postgresql://host:5432/dbname
#       JDBC_DATABASE_USERNAME
#       JDBC_DATABASE_PASSWORD
#     Render exposes them under those exact names; on Heroku you can set them
#     once with: heroku config:set JDBC_DATABASE_URL=...
#
#   * A PORT env var pointing at the public HTTP port - the base
#     application.properties already reads it (server.port=${PORT:8080}).
#
#   * The frontend's public origin via CORS_ALLOWED_ORIGINS, e.g.
#       CORS_ALLOWED_ORIGINS=https://hsqe.example.com
#     (read by WebConfig.java; defaults are localhost-only.)
#
# Tightening over the dev profile:
#   * No H2 fallback - the app fails fast on boot if DB env vars are missing.
#   * Hibernate is set to "validate" so the schema is never silently mutated;
#     use Flyway / Liquibase / your DBA's migration process instead.
#   * Connection pool sized for a small online DB tier.
#   * Error responses are stripped of stack traces / messages / class names.
#   * Logging is quieter so production logs stay readable.
# ===========================================================================

# ---------------------------------------------------------------------------
# Datasource - production MUST set JDBC_DATABASE_URL.
# ---------------------------------------------------------------------------
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=${JDBC_DRIVER:org.postgresql.Driver}

# HikariCP - tuned for a modest online Postgres tier (e.g. Render free).
# Bump these once you know your traffic profile.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# Never mutate the schema automatically in production.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Lazy-load LOBs / improve batched insert/update throughput.
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ---------------------------------------------------------------------------
# Lock down development-only endpoints
# ---------------------------------------------------------------------------
# H2 console would be an open SQL shell if it ever loaded - belt and braces.
spring.h2.console.enabled=false

# ---------------------------------------------------------------------------
# Error responses: don't leak internal details to clients.
# ---------------------------------------------------------------------------
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Compress responses on the wire to save bandwidth on the host.
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# Graceful shutdown: finish in-flight requests when the host sends SIGTERM.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.hsqe=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
