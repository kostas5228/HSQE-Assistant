# ===========================================================================
#  DEVELOPMENT PROFILE  (active by default - see application.properties)
# ===========================================================================
# Use this profile while developing on your own machine. It expects a local
# PostgreSQL server running on localhost:5432 with a database called "hsqe".
#
# One-time local setup (any one of the options below):
#
#   * Native Postgres on Windows
#       1. Install PostgreSQL (https://www.postgresql.org/download/windows/).
#       2. Open psql and run:
#            CREATE DATABASE hsqe;
#            CREATE USER hsqe WITH PASSWORD 'hsqe';
#            GRANT ALL PRIVILEGES ON DATABASE hsqe TO hsqe;
#
#   * Docker (one-liner, no install):
#       docker run --name hsqe-pg -e POSTGRES_DB=hsqe \
#         -e POSTGRES_USER=hsqe -e POSTGRES_PASSWORD=hsqe \
#         -p 5432:5432 -d postgres:16
#
# Override any of the values below by exporting environment variables before
# you start the app (LOCAL_DB_URL / LOCAL_DB_USERNAME / LOCAL_DB_PASSWORD).
# ===========================================================================

# ---------------------------------------------------------------------------
# Datasource - local Postgres
# ---------------------------------------------------------------------------
spring.datasource.url=${LOCAL_DB_URL:jdbc:postgresql://localhost:5432/hsqe}
spring.datasource.username=${LOCAL_DB_USERNAME:postgres}
spring.datasource.password=${LOCAL_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool: keep small in dev so a stuck query is obvious.
spring.datasource.hikari.maximum-pool-size=5

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# Auto-create / update tables from the JPA entities. Convenient in dev,
# but never use this in prod (the prod profile sets it to "validate").
spring.jpa.hibernate.ddl-auto=update

# Pretty-print SQL in the console - very useful when something is off.
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Tell Hibernate explicitly that we are on Postgres so it picks the right
# dialect / sequence handling / etc.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------------------
# Logging - more verbose in dev so we can debug easily.
# ---------------------------------------------------------------------------
logging.level.com.hsqe=DEBUG
logging.level.org.springframework.web=INFO
# Set the next two to DEBUG/TRACE if you ever need to see SQL + bind params.
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
